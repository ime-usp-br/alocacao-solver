services:
  redis:
    image: redis:7-alpine
    container_name: alocacao-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alocacao-api
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-8015}:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alocacao-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: ["rq", "worker"]

volumes:
  redis_data:
